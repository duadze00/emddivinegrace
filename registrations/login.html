<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/styles/login.css" />
    <title>EMD Divine Grace</title>
  </head>
  <body>
    <header>
      <nav>
        <a href="/index.html"
          ><img class="logo" src="/images/emd_logo.svg" alt="Logo"
        /></a>
        <div class="register">
          <a id="sign-in" href="/registrations/login.html">Sign In</a>
          <a id="sign-up" href="/registrations/register.html">Sign Up</a>
        </div>
      </nav>
    </header>
    <main class="auth-container">
      <section class="auth-card">
        <!-- BRAND HEADER -->
        <div class="brand">
          <img src="/images/emd_logo.svg" alt="EMD Logo" class="brand-logo" />
          <h2>EMD Divine Grace</h2>
          <p class="subtitle">Welcome back, please login to continue</p>
        </div>

        <form action="" method="POST">
          <label for="user-email">Email</label>
          <input
            type="email"
            id="user-email"
            name="user-email"
            placeholder="you@example.com"
          />

          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
          />

          <button type="submit">Login</button>

          <p class="reset">
            Forgotten password?
            <a href="/registrations/forgot_password.html">Reset Password</a>
          </p>
        </form>
      </section>
    </main>
  </body>
  <footer>
    <p>&copy; 2026 <span>EMD</span> Divine Grace. All Rights Reserved.</p>
  </footer>
</html>
