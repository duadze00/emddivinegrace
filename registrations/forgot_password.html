<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="../images/emd_logo.svg" alt="EMD Logo" />
    <link rel="stylesheet" href="../styles/forgot_password.css" />
    <title>EMD Divine Grace</title>
  </head>
  <body>
    <header>
      <nav>
        <a href="../index.html"
          ><img class="logo" src="../images/emd_logo.svg" alt="Logo"
        /></a>
        <div class="register">
          <a id="sign-in" href="../registrations/login.html">Sign In</a>
          <a id="sign-up" href="../registrations/register.html">Sign Up</a>
        </div>
      </nav>
    </header>
    <main class="auth-container">
      <section class="auth-card">
        <!-- BRAND -->
        <div class="brand">
          <img src="../images/emd_logo.svg" alt="EMD Logo" class="brand-logo" />
          <h2><span>EMD</span> Divine Grace</h2>
          <p class="subtitle">
            Enter your email and we'll send you a reset link
          </p>
        </div>

        <form action="" method="POST">
          <label for="user-email">Email</label>
          <input
            type="email"
            id="user-email"
            name="user-email"
            placeholder="you@example.com"
            required
          />

          <button type="submit">Send reset link</button>

          <p class="back">
            Remember your password?
            <a href="../registrations/login.html">Go back to login</a>
          </p>
        </form>
      </section>
    </main>
  </body>
  <footer>
    <p>&copy; 2026 <span>EMD</span> Divine Grace. All Rights Reserved.</p>
    <p>Learn, Build and Grow</p>
  </footer>
</html>
