<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/styles/register.css" />
    <title>EMD Divine Grace</title>
  </head>
  <body>
    <header>
      <nav>
        <a href="/index.html" class="logo"
          ><img src="/images/logo.png" alt="Logo"
        /></a>
        <a href="/paid_course/paid_course.html" id="nav__paid-course"
          >Paid Courses</a
        >
      </nav>
    </header>
    <main>
      <section>
        <h3>Register here</h3>
        <p>
          Note: All fields marked with <span class="required">*</span> means
          required
        </p>
        <form action="">
          <label for="username">Username<span class="required">*</span></label>
          <input type="text" id="username" name="username" />
          <label for="email">Email<span class="required">*</span></label>
          <input type="email" id="user-email" name="user-email" />
          <label for="password">Password<span class="required">*</span></label>
          <input type="password" name="password" id="password" />
          <label for="password"
            >Confirm Password<span class="required">*</span></label
          >
          <input
            type="confirm_password"
            name="confirm_password"
            id="confirm_password"
          />
          <label for="user-number"
            >Phone Number<span class="required">*</span></label
          >
          <input type="tel" name="user-number" id="user-number" />
          <label for="date-of-birth"
            >Date of Birth<span class="required">*</span></label
          >
          <input type="date" />
          <label for="gender"> Gender<span class="required">*</span></label>
          <div id="gender">
            <div class="gender__child">
              <label for="male">Male</label>
              <input type="radio" id="male" name="gender" value="male" />
            </div>
            <div class="gender__child">
              <label for="female">Female</label>
              <input type="radio" id="female" name="gender" value="female" />
            </div>
          </div>
          <label for="coures">Course<span class="required">*</span></label>
          <select name="course" id="course">
            <option value="default">Select one below</option>
            <option value="sonography">Sonography</option>
            <option value="programming">Software Engineering</option>
            <option value="graphic_design">Graphic Design</option>
          </select>
          <button value="submit">Submit</button>
        </form>

        <p>
          Already has an account
          <a href="/registrations/login.html">Login</a>
        </p>
      </section>
    </main>
  </body>
  <footer>
    <p>&copy; 2026 <span>EMD</span> Divine Grace. All Rights Reserved.</p>
  </footer>
</html>
