<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="../images/emd_logo.svg" />
    <link rel="stylesheet" href="../styles/register.css" />
    <title>EMD Divine Grace</title>
  </head>
  <body>
    <header>
      <nav>
        <a href="../index.html"
          ><img class="logo" src="../images/emd_logo.svg" alt="Logo"
        /></a>
        <div class="register">
          <a id="sign-in" href="../registrations/login.html">Sign In</a>
          <a id="sign-up" href="../registrations/register.html">Sign Up</a>
        </div>
      </nav>
    </header>
    <main class="auth-container">
      <section class="auth-card">
        <!-- BRAND AREA -->
        <div class="brand">
          <img src="../images/emd_logo.svg" alt="EMD Logo" class="brand-logo" />
          <h2><span>EMD</span> Divine Grace</h2>
          <p class="subtitle">
            Create account to get started. Fields marked
            <span class="required">*</span> are required
          </p>
        </div>

        <form action="" method="POST">
          <label for="username">Username<span class="required">*</span></label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Enter username"
          />

          <label for="user-email">Email<span class="required">*</span></label>
          <input
            type="email"
            id="user-email"
            name="user-email"
            placeholder="you@example.com"
          />

          <label for="password">Password<span class="required">*</span></label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
          />

          <label for="confirm_password"
            >Confirm Password<span class="required">*</span></label
          >
          <input
            type="password"
            id="confirm_password"
            name="confirm_password"
            placeholder="••••••••"
          />

          <label for="user-number"
            >Phone Number<span class="required">*</span></label
          >
          <input
            type="tel"
            id="user-number"
            name="user-number"
            placeholder="+233..."
          />

          <label for="date-of-birth"
            >Date of Birth<span class="required">*</span></label
          >
          <input type="date" id="date-of-birth" name="date-of-birth" />

          <label for="course">Course<span class="required">*</span></label>
          <select id="course" name="course">
            <option value="">Select a course</option>
            <option value="sonography">Sonography</option>
            <option value="programming">Software Engineering</option>
            <option value="graphic_design">Graphic Design</option>
          </select>

          <button type="submit">Create Account</button>

          <p class="login-text">
            Already have an account?
            <a href="../registrations/login.html">Sign in</a>
          </p>
        </form>
      </section>
    </main>
    <footer>
      <p>&copy; 2026 <span>EMD</span> Divine Grace. All Rights Reserved.</p>
      <p>Learn, Build and Grow</p>
    </footer>
  </body>
</html>
